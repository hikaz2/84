<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOSELL - Admin Paneli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-yellow: #FFD700;
            --primary-black: #1a1a1a;
            --text-dark: #2a2a2a;
            --text-light: #666;
            --border-color: #e0e0e0;
            --light-bg: #f5f5f5;
            --white: #fff;
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* LOGIN SECTION */
        #loginSection {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-black) 0%, #2a2a2a 100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
        }

        #loginSection.hidden {
            display: none !important;
        }

        .login-box {
            background: var(--white);
            padding: 3.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            max-width: 420px;
            width: 90%;
            border-top: 5px solid var(--primary-yellow);
        }

        .login-box h1 {
            color: var(--primary-yellow);
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 2.8rem;
            letter-spacing: 3px;
            font-weight: 900;
        }

        .login-box h2 {
            text-align: center;
            color: var(--primary-black);
            margin-bottom: 2rem;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.7rem;
            font-weight: 700;
            color: var(--primary-black);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-yellow);
            box-shadow: 0 0 12px rgba(255,215,0,0.2);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-yellow) 0%, #ffed4e 100%);
            color: var(--primary-black);
            border: none;
            padding: 14px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255,215,0,0.2);
            transition: all 0.3s;
        }

        .btn-login:active {
            transform: translateY(-2px);
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 1.2rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #c62828;
            display: none;
            font-weight: 600;
        }

        /* ADMIN SECTION */
        #adminSection {
            display: none;
        }

        #adminSection.show {
            display: block;
        }

        header {
            background: linear-gradient(135deg, var(--primary-black) 0%, #2a2a2a 100%);
            color: var(--white);
            padding: 1.5rem 0;
            box-shadow: var(--shadow);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary-yellow);
            letter-spacing: 3px;
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--primary-yellow) 0%, #ffed4e 100%);
            color: var(--primary-black);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .logout-btn:active {
            transform: translateY(-2px);
        }

        .admin-content {
            padding: 2rem 20px;
        }

        h2 {
            color: var(--primary-black);
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 900;
        }

        .subtitle {
            color: var(--text-light);
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
            border-left: 4px solid var(--primary-yellow);
        }

        .stat-card h4 {
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-black);
        }

        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--white);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }

        .search-bar input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--primary-yellow);
        }

        .btn-search {
            background: linear-gradient(135deg, var(--primary-yellow) 0%, #ffed4e 100%);
            color: var(--primary-black);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
        }

        .btn-reset {
            background: var(--text-light);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
        }

        .btn-delete-all {
            background: #dc3545;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
        }

        .table-container {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--primary-black);
            color: var(--white);
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 700;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        tbody tr:hover {
            background: var(--light-bg);
        }

        .ref-code {
            background: #e3f2fd;
            color: #1976d2;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-weight: 700;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .btn-detail {
            background: #2196F3;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 0.5rem;
            font-weight: 600;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .no-data {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            font-size: 1.1rem;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .modal.show {
            display: block;
        }

        .modal-content {
            background: var(--white);
            margin: 2% auto;
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 900px;
            box-shadow: var(--shadow);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--primary-yellow);
            padding-bottom: 1rem;
        }

        .modal-header h3 {
            margin: 0;
            color: var(--primary-black);
            font-size: 1.5rem;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .detail-item label {
            color: var(--primary-black);
            font-weight: 700;
            margin-bottom: 0.3rem;
            display: block;
            font-size: 0.9rem;
        }

        .detail-item p {
            color: var(--text-dark);
            margin: 0;
            background: var(--light-bg);
            padding: 0.7rem;
            border-radius: 5px;
            word-break: break-word;
            font-size: 0.95rem;
        }

        .section-title {
            color: var(--primary-black);
            font-size: 1.1rem;
            font-weight: 700;
            margin: 1.5rem 0 1rem 0;
            border-bottom: 2px solid var(--primary-yellow);
            padding-bottom: 0.5rem;
        }

        .damage-list {
            background: var(--light-bg);
            padding: 1rem;
            border-radius: 5px;
            margin-top: 0.5rem;
        }

        .damage-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .damage-item:last-child {
            border-bottom: none;
        }

        @media (max-width: 768px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }

            .search-bar {
                flex-direction: column;
            }

            .search-bar input,
            .search-bar button {
                width: 100%;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 0.75rem;
            }

            .modal-content {
                width: 95%;
                margin: 10% auto;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN BÖLÜMÜ -->
    <div id="loginSection">
        <div class="login-box">
            <h1>OTOSELL</h1>
            <h2>Admin Paneli</h2>
            <div id="errorMessage" class="error-message"></div>
            
            <div class="form-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="admin">
            </div>
            
            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" placeholder="1234">
            </div>
            
            <button class="btn-login" onclick="adminLogin()">Giriş Yap</button>
        </div>
    </div>

    <!-- ADMIN BÖLÜMÜ -->
    <div id="adminSection">
        <header>
            <div class="container">
                <div class="logo">OTOSELL</div>
                <button class="logout-btn" onclick="adminLogout()">Çıkış Yap</button>
            </div>
        </header>

        <div class="admin-content">
            <div class="container">
                <h2>Gönderilen Teklifler</h2>
                <p class="subtitle">Araç tekliflerinin yönetimi ve takibi</p>

                <!-- İSTATİSTİKLER -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <h4>Toplam Teklif</h4>
                        <div class="number" id="statTotal">0</div>
                    </div>
                    <div class="stat-card">
                        <h4>Bugün</h4>
                        <div class="number" id="statToday">0</div>
                    </div>
                    <div class="stat-card">
                        <h4>Bu Hafta</h4>
                        <div class="number" id="statWeek">0</div>
                    </div>
                </div>

                <!-- ARAMA BARI -->
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Referans kodu, ad, email ya da telefon ile ara...">
                    <button class="btn-search" onclick="searchSubmissions()">Ara</button>
                    <button class="btn-reset" onclick="loadAllSubmissions()">Tümünü Göster</button>
                    <button class="btn-delete-all" onclick="deleteAllSubmissions()">Hepsini Sil</button>
                </div>

                <!-- TABLO -->
                <div class="table-container">
                    <div id="tableContent"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- DETAY MODAL -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detaylı Bilgiler</h3>
                <button class="close-modal" onclick="closeDetailModal()">✕</button>
            </div>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>
        // ADMIN GİRİŞİ
        function adminLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            if (!username || !password) {
                errorMessage.textContent = '⚠️ Kullanıcı adı ve şifre girin';
                errorMessage.style.display = 'block';
                return;
            }

            if (username === 'admin' && password === '1234') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminSection').classList.add('show');
                loadAllSubmissions();
            } else {
                errorMessage.textContent = '❌ Hatalı kimlik bilgileri';
                errorMessage.style.display = 'block';
            }
        }

        // ADMIN ÇIKIŞ
        function adminLogout() {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('adminSection').classList.remove('show');
        }

        // TÜM TEKLİFLERİ YÜKLE
        function loadAllSubmissions() {
            const submissions = JSON.parse(localStorage.getItem('otosellSubmissions')) || [];
            displaySubmissions(submissions);
            updateStats(submissions);
        }

        // TEKLİFLERİ GÖSTER
        function displaySubmissions(submissions) {
            const container = document.getElementById('tableContent');

            if (submissions.length === 0) {
                container.innerHTML = '<div class="no-data">📭 Henüz teklif bulunmamaktadır</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Referans</th>
                            <th>Ad Soyad</th>
                            <th>Araç</th>
                            <th>Telefon</th>
                            <th>Email</th>
                            <th>Tarih</th>
                            <th>İşlem</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            submissions.forEach((item, index) => {
                html += `
                    <tr>
                        <td><span class="ref-code">${item.referenceCode}</span></td>
                        <td>${item.firstName} ${item.lastName}</td>
                        <td>${item.brand} ${item.model}</td>
                        <td>${item.phone}</td>
                        <td>${item.email || '-'}</td>
                        <td>${item.submittedAt}</td>
                        <td>
                            <button class="btn-detail" onclick="viewDetails(${index})">Detay</button>
                            <button class="btn-delete" onclick="deleteSubmission(${index})">Sil</button>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // DETAY GÖR
        function viewDetails(index) {
            const submissions = JSON.parse(localStorage.getItem('otosellSubmissions')) || [];
            const item = submissions[index];

            if (!item) return;

            let damageInfo = '';
            try {
                const damages = JSON.parse(item.damages || '{}');
                if (Object.keys(damages).length > 0) {
                    damageInfo = '<div class="damage-list">';
                    for (const [id, damage] of Object.entries(damages)) {
                        damageInfo += `<div class="damage-item"><strong>${id}:</strong> ${damage}</div>`;
                    }
                    damageInfo += '</div>';
                }
            } catch (e) {
                damageInfo = '';
            }

            const detailContent = document.getElementById('detailContent');
            detailContent.innerHTML = `
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Referans Kodu:</label>
                        <p>${item.referenceCode}</p>
                    </div>
                    <div class="detail-item">
                        <label>Tarih:</label>
                        <p>${item.submittedAt}</p>
                    </div>
                </div>

                <div class="section-title">👤 Kişisel Bilgiler</div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Ad Soyad:</label>
                        <p>${item.firstName} ${item.lastName}</p>
                    </div>
                    <div class="detail-item">
                        <label>Telefon:</label>
                        <p>${item.phone}</p>
                    </div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Email:</label>
                        <p>${item.email || '-'}</p>
                    </div>
                    <div class="detail-item">
                        <label>Şehir/İlçe:</label>
                        <p>${item.city} / ${item.district}</p>
                    </div>
                </div>

                <div class="section-title">🚗 Araç Bilgileri</div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Marka/Model:</label>
                        <p>${item.brand} ${item.model}</p>
                    </div>
                    <div class="detail-item">
                        <label>Yıl:</label>
                        <p>${item.year}</p>
                    </div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Kilometre:</label>
                        <p>${Number(item.mileage).toLocaleString()} km</p>
                    </div>
                    <div class="detail-item">
                        <label>Araç Türü:</label>
                        <p>${item.bodyType}</p>
                    </div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Renk:</label>
                        <p>${item.color}</p>
                    </div>
                </div>

                <div class="section-title">⚙️ Motor & Özellikleri</div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Yakıt Türü:</label>
                        <p>${item.fuel}</p>
                    </div>
                    <div class="detail-item">
                        <label>Şanzıman:</label>
                        <p>${item.transmission}</p>
                    </div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Motor Hacmi:</label>
                        <p>${item.engineSize} L</p>
                    </div>
                    <div class="detail-item">
                        <label>Beygir Gücü:</label>
                        <p>${item.horsepower} BG</p>
                    </div>
                </div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Çekiş Sistemi:</label>
                        <p>${item.wheelDrive}</p>
                    </div>
                </div>

                <div class="section-title">🔍 Araç Durumu</div>
                <div class="detail-item">
                    <label>Boya Hasarları:</label>
                    ${damageInfo || '<p>Hasar yok</p>'}
                </div>
                <div class="detail-grid">
                    <div class="detail-item">
                        <label>Kaza Geçmişi:</label>
                        <p>${item.hasAccident}</p>
                    </div>
                    <div class="detail-item">
                        <label>İç Durumu:</label>
                        <p>${item.interiorCondition}</p>
                    </div>
                </div>

                ${item.defects ? `
                    <div class="detail-item">
                        <label>Kusurlar / Hatalar:</label>
                        <p>${item.defects}</p>
                    </div>
                ` : ''}
            `;

            document.getElementById('detailModal').classList.add('show');
        }

        // MODAL KAPAT
        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // TEKLİF SİL
        function deleteSubmission(index) {
            if (confirm('Bu teklifi silmek istediğinize emin misiniz?')) {
                let submissions = JSON.parse(localStorage.getItem('otosellSubmissions')) || [];
                submissions.splice(index, 1);
                localStorage.setItem('otosellSubmissions', JSON.stringify(submissions));
                loadAllSubmissions();
                closeDetailModal();
            }
        }

        // ARAMA YAP
        function searchSubmissions() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (!searchTerm) {
                loadAllSubmissions();
                return;
            }

            let submissions = JSON.parse(localStorage.getItem('otosellSubmissions')) || [];
            const filtered = submissions.filter(item =>
                item.referenceCode.toLowerCase().includes(searchTerm) ||
                item.firstName.toLowerCase().includes(searchTerm) ||
                item.lastName.toLowerCase().includes(searchTerm) ||
                item.email.toLowerCase().includes(searchTerm) ||
                item.phone.includes(searchTerm)
            );
            displaySubmissions(filtered);
        }

        // İSTATİSTİKLERİ GÜNCELLE
        function updateStats(submissions) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const thisWeekStart = new Date(today);
            thisWeekStart.setDate(thisWeekStart.getDate() - thisWeekStart.getDay());

            let todayCount = 0;
            let weekCount = 0;

            submissions.forEach(item => {
                const itemDate = new Date(item.submittedAt);
                itemDate.setHours(0, 0, 0, 0);

                if (itemDate.getTime() === today.getTime()) {
                    todayCount++;
                }

                if (itemDate >= thisWeekStart) {
                    weekCount++;
                }
            });

            document.getElementById('statTotal').textContent = submissions.length;
            document.getElementById('statToday').textContent = todayCount;
            document.getElementById('statWeek').textContent = weekCount;
        }

        // HEPSİNİ SİL
        function deleteAllSubmissions() {
            if (confirm('Tüm teklifleri silmek istediğinize emin misiniz? Bu işlem geri alınamaz!')) {
                localStorage.removeItem('otosellSubmissions');
                loadAllSubmissions();
            }
        }

        // MODAL DIŞINDA KAPANSIN
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeDetailModal();
            }
        }
    </script>
</body>
</html>
