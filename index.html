<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otosell - Araç Veri Tabanı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        label {
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        select, input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            background-color: #f9f9f9;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            background-color: white;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-search {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .results {
            margin-top: 30px;
        }

        .result-item {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .result-item:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }

        .result-item h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .result-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            color: #666;
        }

        .detail {
            padding: 10px;
            background: white;
            border-radius: 5px;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
        }

        .detail-value {
            color: #667eea;
            font-weight: 500;
            margin-top: 5px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 30px;
        }

        .stats p {
            font-size: 1.1em;
            margin: 5px 0;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Otosell - Araç Veri Tabanı</h1>

        <div class="stats">
            <p id="stats-text">Veritabanı yükleniyor...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="filters">
            <div class="filter-group">
                <label for="marka">Marka</label>
                <select id="marka">
                    <option value="">-- Marka Seçin --</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="model">Model</label>
                <select id="model">
                    <option value="">-- Model Seçin --</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="govde">Gövde Tipi</label>
                <select id="govde">
                    <option value="">-- Gövde Seçin --</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="yil">Yıl</label>
                <select id="yil">
                    <option value="">-- Yıl Seçin --</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="yakut">Yakıt</label>
                <select id="yakut">
                    <option value="">-- Yakıt Seçin --</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="vites">Vites</label>
                <select id="vites">
                    <option value="">-- Vites Seçin --</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="motor">Motor</label>
                <select id="motor">
                    <option value="">-- Motor Seçin --</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="cekis">Çekiş</label>
                <select id="cekis">
                    <option value="">-- Çekiş Seçin --</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="paket">Paket</label>
                <select id="paket">
                    <option value="">-- Paket Seçin --</option>
                </select>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-search" onclick="searchVehicles()">🔍 Ara</button>
            <button class="btn-reset" onclick="resetFilters()">🔄 Sıfırla</button>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        let vehicleData = {};
        let allBrands = [];

        // Verileri yükle
        async function loadData() {
            try {
                const response = await fetch('vehicleData.json');
                if (!response.ok) throw new Error('Veri yüklenemedi');
                vehicleData = await response.json();
                
                // Markaları al
                allBrands = Object.keys(vehicleData).sort();
                
                // İstatistikleri güncelle
                updateStats();
                
                // Marka dropdown'ını doldur
                populateMarkaDropdown();
                
                console.log('Veriler başarıyla yüklendi:', vehicleData);
            } catch (error) {
                showError('Veri yüklenirken hata oluştu: ' + error.message);
                console.error('Hata:', error);
            }
        }

        function updateStats() {
            const markaSayisi = Object.keys(vehicleData).length;
            const toplam = countAllVehicles(vehicleData);
            document.getElementById('stats-text').innerHTML = 
                `📊 Toplam ${markaSayisi} marka | ${toplam} araç modeli`;
        }

        function countAllVehicles(obj, count = 0) {
            for (let key in obj) {
                if (typeof obj[key] === 'object') {
                    count = countAllVehicles(obj[key], count);
                } else if (Array.isArray(obj[key])) {
                    count += obj[key].length;
                }
            }
            return count;
        }

        function populateMarkaDropdown() {
            const markaSelect = document.getElementById('marka');
            allBrands.forEach(marka => {
                const option = document.createElement('option');
                option.value = marka;
                option.textContent = marka;
                markaSelect.appendChild(option);
            });
        }

        function updateModelDropdown() {
            const marka = document.getElementById('marka').value;
            const modelSelect = document.getElementById('model');
            
            modelSelect.innerHTML = '<option value="">-- Model Seçin --</option>';
            
            if (marka && vehicleData[marka]) {
                const modeller = Object.keys(vehicleData[marka]).sort();
                modeller.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model;
                    option.textContent = model;
                    modelSelect.appendChild(option);
                });
            }
        }

        function updateGovdeDropdown() {
            const marka = document.getElementById('marka').value;
            const model = document.getElementById('model').value;
            const govdeSelect = document.getElementById('govde');
            
            govdeSelect.innerHTML = '<option value="">-- Gövde Seçin --</option>';
            
            if (marka && model && vehicleData[marka] && vehicleData[marka][model]) {
                const govdeler = Object.keys(vehicleData[marka][model]).sort();
                govdeler.forEach(govde => {
                    const option = document.createElement('option');
                    option.value = govde;
                    option.textContent = govde;
                    govdeSelect.appendChild(option);
                });
            }
        }

        function updateYilDropdown() {
            const marka = document.getElementById('marka').value;
            const model = document.getElementById('model').value;
            const govde = document.getElementById('govde').value;
            const yilSelect = document.getElementById('yil');
            
            yilSelect.innerHTML = '<option value="">-- Yıl Seçin --</option>';
            
            if (marka && model && govde && vehicleData[marka] && vehicleData[marka][model] && vehicleData[marka][model][govde]) {
                const yillar = Object.keys(vehicleData[marka][model][govde]).sort().reverse();
                yillar.forEach(yil => {
                    const option = document.createElement('option');
                    option.value = yil;
                    option.textContent = yil;
                    yilSelect.appendChild(option);
                });
            }
        }

        function updateYakutDropdown() {
            const marka = document.getElementById('marka').value;
            const model = document.getElementById('model').value;
            const govde = document.getElementById('govde').value;
            const yil = document.getElementById('yil').value;
            const yakutSelect = document.getElementById('yakut');
            
            yakutSelect.innerHTML = '<option value="">-- Yakıt Seçin --</option>';
            
            if (marka && model && govde && yil && vehicleData[marka]?.[model]?.[govde]?.[yil]) {
                const yakutlar = Object.keys(vehicleData[marka][model][govde][yil]).sort();
                yakutlar.forEach(yakut => {
                    const option = document.createElement('option');
                    option.value = yakut;
                    option.textContent = yakut;
                    yakutSelect.appendChild(option);
                });
            }
        }

        function updateVitesDropdown() {
            const marka = document.getElementById('marka').value;
            const model = document.getElementById('model').value;
            const govde = document.getElementById('govde').value;
            const yil = document.getElementById('yil').value;
            const yakut = document.getElementById('yakut').value;
            const vitesSelect = document.getElementById('vites');
            
            vitesSelect.innerHTML = '<option value="">-- Vites Seçin --</option>';
            
            if (marka && model && govde && yil && yakut && vehicleData[marka]?.[model]?.[govde]?.[yil]?.[yakut]) {
                const vitesler = Object.keys(vehicleData[marka][model][govde][yil][yakut]).sort();
                vitesler.forEach(vites => {
                    const option = document.createElement('option');
                    option.value = vites;
                    option.textContent = vites;
                    vitesSelect.appendChild(option);
                });
            }
        }

        function updateMotorDropdown() {
            const marka = document.getElementById('marka').value;
            const model = document.getElementById('model').value;
            const govde = document.getElementById('govde').value;
            const yil = document.getElementById('yil').value;
            const yakut = document.getElementById('yakut').value;
            const vites = document.getElementById('vites').value;
            const motorSelect = document.getElementById('motor');
            
            motorSelect.innerHTML = '<option value="">-- Motor Seçin --</option>';
            
            if (marka && model && govde && yil && yakut && vites && vehicleData[marka]?.[model]?.[govde]?.[yil]?.[yakut]?.[vites]) {
                const motorlar = Object.keys(vehicleData[marka][model][govde][yil][yakut][vites]).sort();
                motorlar.forEach(motor => {
                    const option = document.createElement('option');
                    option.value = motor;
                    option.textContent = motor;
                    motorSelect.appendChild(option);
                });
            }
        }

        function updateCekisDropdown() {
            const marka = document.getElementById('marka').value;
            const model = document.getElementById('model').value;
            const govde = document.getElementById('govde').value;
            const yil = document.getElementById('yil').value;
            const yakut = document.getElementById('yakut').value;
            const vites = document.getElementById('vites').value;
            const motor = document.getElementById('motor').value;
            const cekisSelect = document.getElementById('cekis');
            
            cekisSelect.innerHTML = '<option value="">-- Çekiş Seçin --</option>';
            
            if (marka && model && govde && yil && yakut && vites && motor && vehicleData[marka]?.[model]?.[govde]?.[yil]?.[yakut]?.[vites]?.[motor]) {
                const cekisler = Object.keys(vehicleData[marka][model][govde][yil][yakut][vites][motor]).sort();
                cekisler.forEach(cekis => {
                    const option = document.createElement('option');
                    option.value = cekis;
                    option.textContent = cekis;
                    cekisSelect.appendChild(option);
                });
            }
        }

        function updatePaketDropdown() {
            const marka = document.getElementById('marka').value;
            const model = document.getElementById('model').value;
            const govde = document.getElementById('govde').value;
            const yil = document.getElementById('yil').value;
            const yakut = document.getElementById('yakut').value;
            const vites = document.getElementById('vites').value;
            const motor = document.getElementById('motor').value;
            const cekis = document.getElementById('cekis').value;
            const paketSelect = document.getElementById('paket');
            
            paketSelect.innerHTML = '<option value="">-- Paket Seçin --</option>';
            
            if (marka && model && govde && yil && yakut && vites && motor && cekis && 
                vehicleData[marka]?.[model]?.[govde]?.[yil]?.[yakut]?.[vites]?.[motor]?.[cekis]) {
                const paketler = vehicleData[marka][model][govde][yil][yakut][vites][motor][cekis];
                paketler.forEach(paket => {
                    const option = document.createElement('option');
                    option.value = paket;
                    option.textContent = paket;
                    paketSelect.appendChild(option);
                });
            }
        }

        // Event listeners
        document.getElementById('marka').addEventListener('change', function() {
            updateModelDropdown();
            document.getElementById('govde').innerHTML = '<option value="">-- Gövde Seçin --</option>';
            document.getElementById('yil').innerHTML = '<option value="">-- Yıl Seçin --</option>';
            document.getElementById('yakut').innerHTML = '<option value="">-- Yakıt Seçin --</option>';
            document.getElementById('vites').innerHTML = '<option value="">-- Vites Seçin --</option>';
            document.getElementById('motor').innerHTML = '<option value="">-- Motor Seçin --</option>';
            document.getElementById('cekis').innerHTML = '<option value="">-- Çekiş Seçin --</option>';
            document.getElementById('paket').innerHTML = '<option value="">-- Paket Seçin --</option>';
        });

        document.getElementById('model').addEventListener('change', function() {
            updateGovdeDropdown();
            document.getElementById('yil').innerHTML = '<option value="">-- Yıl Seçin --</option>';
            document.getElementById('yakut').innerHTML = '<option value="">-- Yakıt Seçin --</option>';
            document.getElementById('vites').innerHTML = '<option value="">-- Vites Seçin --</option>';
            document.getElementById('motor').innerHTML = '<option value="">-- Motor Seçin --</option>';
            document.getElementById('cekis').innerHTML = '<option value="">-- Çekiş Seçin --</option>';
            document.getElementById('paket').innerHTML = '<option value="">-- Paket Seçin --</option>';
        });

        document.getElementById('govde').addEventListener('change', function() {
            updateYilDropdown();
            document.getElementById('yakut').innerHTML = '<option value="">-- Yakıt Seçin --</option>';
            document.getElementById('vites').innerHTML = '<option value="">-- Vites Seçin --</option>';
            document.getElementById('motor').innerHTML = '<option value="">-- Motor Seçin --</option>';
            document.getElementById('cekis').innerHTML = '<option value="">-- Çekiş Seçin --</option>';
            document.getElementById('paket').innerHTML = '<option value="">-- Paket Seçin --</option>';
        });

        document.getElementById('yil').addEventListener('change', function() {
            updateYakutDropdown();
            document.getElementById('vites').innerHTML = '<option value="">-- Vites Seçin --</option>';
            document.getElementById('motor').innerHTML = '<option value="">-- Motor Seçin --</option>';
            document.getElementById('cekis').innerHTML = '<option value="">-- Çekiş Seçin --</option>';
            document.getElementById('paket').innerHTML = '<option value="">-- Paket Seçin --</option>';
        });

        document.getElementById('yakut').addEventListener('change', function() {
            updateVitesDropdown();
            document.getElementById('motor').innerHTML = '<option value="">-- Motor Seçin --</option>';
            document.getElementById('cekis').innerHTML = '<option value="">-- Çekiş Seçin --</option>';
            document.getElementById('paket').innerHTML = '<option value="">-- Paket Seçin --</option>';
        });

        document.getElementById('vites').addEventListener('change', function() {
            updateMotorDropdown();
            document.getElementById('cekis').innerHTML = '<option value="">-- Çekiş Seçin --</option>';
            document.getElementById('paket').innerHTML = '<option value="">-- Paket Seçin --</option>';
        });

        document.getElementById('motor').addEventListener('change', function() {
            updateCekisDropdown();
            document.getElementById('paket').innerHTML = '<option value="">-- Paket Seçin --</option>';
        });

        document.getElementById('cekis').addEventListener('change', function() {
            updatePaketDropdown();
        });

        function searchVehicles() {
            const marka = document.getElementById('marka').value;
            const model = document.getElementById('model').value;
            const govde = document.getElementById('govde').value;
            const yil = document.getElementById('yil').value;
            const yakut = document.getElementById('yakut').value;
            const vites = document.getElementById('vites').value;
            const motor = document.getElementById('motor').value;
            const cekis = document.getElementById('cekis').value;
            const paket = document.getElementById('paket').value;

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (!marka) {
                showError('Lütfen en az Marka seçiniz!');
                return;
            }

            const results = [];

            if (marka && vehicleData[marka]) {
                const modelData = model ? vehicleData[marka][model] : vehicleData[marka];
                
                for (let m in modelData) {
                    if (model && m !== model) continue;
                    
                    const govdeData = govde ? modelData[m][govde] : modelData[m];
                    
                    for (let g in govdeData) {
                        if (govde && g !== govde) continue;
                        
                        const yilData = yil ? govdeData[g][yil] : govdeData[g];
                        
                        for (let y in yilData) {
                            if (yil && y !== yil) continue;
                            
                            const yakutData = yakut ? yilData[y][yakut] : yilData[y];
                            
                            for (let ya in yakutData) {
                                if (yakut && ya !== yakut) continue;
                                
                                const vitesData = vites ? yakutData[ya][vites] : yakutData[ya];
                                
                                for (let v in vitesData) {
                                    if (vites && v !== vites) continue;
                                    
                                    const motorData = motor ? vitesData[v][motor] : vitesData[v];
                                    
                                    for (let mo in motorData) {
                                        if (motor && mo !== motor) continue;
                                        
                                        const cekisData = cekis ? motorData[mo][cekis] : motorData[mo];
                                        
                                        for (let c in cekisData) {
                                            if (cekis && c !== cekis) continue;
                                            
                                            const paketler = cekisData[c];
                                            
                                            paketler.forEach(p => {
                                                if (!paket || p === paket) {
                                                    results.push({
                                                        marka,
                                                        model: m,
                                                        govde: g,
                                                        yil: y,
                                                        yakut: ya,
                                                        vites: v,
                                                        motor: mo,
                                                        cekis: c,
                                                        paket: p
                                                    });
                                                }
                                            });
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }

            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">❌ Sonuç bulunamadı!</div>';
                return;
            }

            results.forEach(result => {
                const resultHTML = `
                    <div class="result-item">
                        <h3>${result.marka} ${result.model}</h3>
                        <div class="result-details">
                            <div class="detail">
                                <div class="detail-label">Gövde Tipi</div>
                                <div class="detail-value">${result.govde}</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">Yıl</div>
                                <div class="detail-value">${result.yil}</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">Yakıt</div>
                                <div class="detail-value">${result.yakut}</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">Vites</div>
                                <div class="detail-value">${result.vites}</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">Motor</div>
                                <div class="detail-value">${result.motor}</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">Çekiş</div>
                                <div class="detail-value">${result.cekis}</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">Paket</div>
                                <div class="detail-value">${result.paket}</div>
                            </div>
                        </div>
                    </div>
                `;
                resultsDiv.innerHTML += resultHTML;
            });
        }

        function resetFilters() {
            document.getElementById('marka').value = '';
            document.getElementById('model').value = '';
            document.getElementById('govde').value = '';
            document.getElementById('yil').value = '';
            document.getElementById('yakut').value = '';
            document.getElementById('vites').value = '';
            document.getElementById('motor').value = '';
            document.getElementById('cekis').value = '';
            document.getElementById('paket').value = '';
            document.getElementById('results').innerHTML = '';
            document.getElementById('error').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Sayfa yüklendiğinde verileri yükle
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
